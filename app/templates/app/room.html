<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Chat Room</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
        }

        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            padding: 1rem;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-box {
            width: 100%;
            max-width: 56.25rem;
            margin: 1.25rem auto 0;
            padding: 0 1rem;
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #38bdf8, #a855f7, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 12px rgba(56, 189, 248, 0.35);
            transition: transform 0.15s ease, text-shadow 0.15s ease;
            word-break: break-word;
        }

        h2:hover {
            transform: translateY(-3px) scale(1.01);
            text-shadow: 0 0 18px rgba(168, 85, 247, 0.25);
        }

        .room-meta {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .user-list {
            font-size: clamp(0.875rem, 3vw, 1rem);
            color: #cbd5e1;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .user-list strong {
            color: #38bdf8;
            text-shadow: 0 0 6px rgba(56, 189, 248, 0.45);
        }

        .user-list span {
            background: linear-gradient(120deg, #a855f7, #38bdf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            transition: transform 0.12s ease, filter 0.12s ease;
            word-break: break-word;
        }

        .user-list span:hover {
            transform: translateY(-2px);
            filter: drop-shadow(0 6px 18px rgba(168, 85, 247, 0.18));
            cursor: pointer;
        }

        .typing-indicator {
            font-size: clamp(0.875rem, 3vw, 1rem);
            color: #cbd5e1;
            min-height: 1.4em;
        }

        #messages {
            flex: 1;
            min-height: 15rem;
            max-height: 50vh;
            overflow-y: auto;
            border: 1px solid #334155;
            padding: 1.25rem;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 0.5rem;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        #messages p {
            margin: 0 0 0.625rem;
            word-break: break-word;
            padding: 0.5rem 0.625rem;
            border-radius: 0.5rem;
            font-size: clamp(0.875rem, 2vw, 1rem);
            line-height: 1.5;
            transition: background 0.12s ease, transform 0.12s ease, box-shadow 0.12s ease;
        }

        #messages p:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(2, 6, 23, 0.5);
        }

        #messages p b {
            color: #a5b4fc;
            transition: color 0.12s ease, text-shadow 0.12s ease;
        }

        #messages p:hover b {
            color: #f472b6;
            text-shadow: 0 0 8px rgba(244, 114, 182, 0.18);
        }

        .input-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        input {
            padding: 0.75rem;
            width: 100%;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            transition: box-shadow 0.12s ease, border-color 0.12s ease;
        }

        input::placeholder {
            color: #64748b;
        }

        input:focus {
            outline: none;
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 8px 20px rgba(2, 6, 23, 0.6);
        }

        #sendButton {
            padding: 0.75rem 1rem;
            width: 100%;
            background: linear-gradient(90deg, #06b6d4, #7c3aed, #fb7185);
            border: none;
            color: #021025;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
        }

        #sendButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.18);
            opacity: 0.98;
        }

        #sendButton:active {
            transform: translateY(0) scale(0.99);
        }

        #sendButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Tablets (640px and up) */
        @media (min-width: 40rem) {
            .chat-box {
                margin-top: 2rem;
            }

            #messages {
                min-height: 20rem;
            }

            .input-container {
                flex-direction: row;
                gap: 0.75rem;
                align-items: flex-end;
            }

            input {
                flex: 1;
                min-width: 0;
            }

            #sendButton {
                width: auto;
                flex-shrink: 0;
                padding: 0.75rem 2rem;
            }
        }

        /* Desktop (1024px and up) */
        @media (min-width: 64rem) {
            .chat-box {
                margin-top: 2.5rem;
                padding: 0;
            }

            #messages {
                min-height: 25rem;
                max-height: 60vh;
            }
        }

        /* Large Desktop (1440px and up) */
        @media (min-width: 90rem) {
            .chat-box {
                max-width: 60rem;
            }
        }

        /* Scrollbar styling for messages */
        #messages::-webkit-scrollbar {
            width: 0.5rem;
        }

        #messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 0.5rem;
        }

        #messages::-webkit-scrollbar-thumb {
            background: #38bdf8;
            border-radius: 0.5rem;
            opacity: 0.6;
        }

        #messages::-webkit-scrollbar-thumb:hover {
            opacity: 0.9;
        }

    </style>
</head>
<body>

<div class="chat-box">

    <h2>Room: {{ room_name }}</h2>

    <div class="room-meta">
        <div class="user-list">
            <strong>Online:</strong> <span id="userNames">Loading...</span>
        </div>
        <div id="typingIndicator" class="typing-indicator"></div>
    </div>

    <div id="messages"></div>

    <div class="input-container">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button id="sendButton" type="button" disabled>Send</button>
    </div>

</div>

<script>

    const currentUser = "{{ username|escapejs }}";
    const roomName = "{{ room_name|escapejs }}";

    const socketProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
    const socketUrl = socketProtocol + window.location.host + '/ws/chat/' + roomName + '/';
    const socket = new WebSocket(socketUrl);
    const messagesEl = document.querySelector('#messages');
    const inputEl = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const userNamesEl = document.getElementById('userNames');
    const typingEl = document.getElementById('typingIndicator');

    let typing = false;
    let stopTypingTimer;
    const TYPING_TIMEOUT = 1000;

    sendButton.disabled = true;
    sendButton.onclick = sendMessage;

    socket.onopen = function() {
        console.log('WebSocket connected:', socketUrl);
        sendButton.disabled = false;
    };

    socket.onmessage = function(e) {
        const data = JSON.parse(e.data);

        if ('user_list' in data) {
            updateUserList(data.user_list);
            return;
        }

        if ('typing' in data) {
            updateTypingIndicator(data.username, data.typing);
            return;
        }

        appendMessage(data.username, data.message);
    };

    socket.onclose = function() {
        console.log('WebSocket closed');
        sendButton.disabled = true;
    };

    socket.onerror = function(error) {
        console.error('WebSocket error:', error);
    };

    inputEl.addEventListener('input', function() {
        const isTyping = inputEl.value.trim().length > 0;

        if (isTyping !== typing) {
            typing = isTyping;
            sendTypingState(typing);
        }

        clearTimeout(stopTypingTimer);
        if (isTyping) {
            stopTypingTimer = setTimeout(function() {
                typing = false;
                sendTypingState(false);
            }, TYPING_TIMEOUT);
        }
    });

    inputEl.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            sendMessage();
        }
    });

    function appendMessage(username, message) {
        if (!message) {
            return;
        }
        messagesEl.innerHTML += `<p><b>${username}</b>: ${message}</p>`;
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateUserList(users) {
        if (!users || users.length === 0) {
            userNamesEl.textContent = 'No users online';
            return;
        }
        userNamesEl.textContent = users.join(', ');
    }

    function updateTypingIndicator(sender, isTyping) {
        if (sender === currentUser) {
            return;
        }

        typingEl.textContent = isTyping ? `${sender} is typing...` : '';
    }

    function sendTypingState(isTyping) {
        if (socket.readyState !== WebSocket.OPEN) {
            return;
        }

        socket.send(JSON.stringify({
            'typing': isTyping,
            'username': currentUser,
        }));
    }

    function sendMessage(){
        const message = inputEl.value.trim();
        if (!message) {
            return;
        }
        if (socket.readyState !== WebSocket.OPEN) {
            appendMessage('System', 'Cannot send message: connection is not open.');
            return;
        }

        socket.send(JSON.stringify({
            'message': message,
            'username': currentUser
        }));
        inputEl.value = '';
        typing = false;
        sendTypingState(false);
    }

</script>

</body>
</html>
