<!DOCTYPE html>
<html>
<head>
    <title>Private Chat</title>

    <style>

        body{
            font-family: Arial;
            background: #0f172a;
            color: white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#1e293b;
            padding:30px;
            border-radius:10px;
            width:300px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.12);
        }

        h2 {
            margin: 0 0 20px;
            font-size: 2rem;
            background: linear-gradient(90deg, #38bdf8, #a855f7, #f97316);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            color: white;
        }

        input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
        }

        button{
            width:100%;
            padding:10px;
            margin-top:20px;
            background: linear-gradient(90deg, #38bdf8, #8b5cf6);
            border:none;
            cursor:pointer;
            color: #0f172a;
            font-weight: 700;
            border-radius: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover{
            transform: translateY(-1px);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.25);
        }

        h2:hover{
            transform: translateY(-2px) scale(1.01);
            text-shadow: 0 0 18px rgba(168,85,247,0.25);
        }

        .box:hover{
            transform: translateY(-3px);
            box-shadow: 0 30px 60px rgba(2,6,23,0.5);
        }

    </style>
</head>
<body>

<div class="box">

    <h2>Private Chat</h2>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}

    <form action="/room/" method="get">

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <input type="text"
               name="room"
               placeholder="Enter Room Name"
               required>

        <button type="submit">Join Chat</button>

    </form>

</div>

</body>
</html>
